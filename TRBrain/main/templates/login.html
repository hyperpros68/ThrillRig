<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:,">
    <title>TRBrain - Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="glass-card">
        <h1 style="text-align: center; margin-bottom: 2rem; color: var(--accent-color);">🧠 TRBrain</h1>
        <p style="text-align: center; color: var(--text-secondary); margin-bottom: 2rem;">Backend Control Center</p>
        
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <div style="color: var(--error); text-align: center; margin-bottom: 1rem; font-size: 0.875rem;">
              {{ messages[0] }}
            </div>
          {% endif %}
        {% endwith %}

        <form method="POST" autocomplete="off">
            <div class="input-group">
                <label>Admin ID</label>
                <input type="text" name="id" id="login_id" required placeholder="Enter ID" autocomplete="new-password">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" name="pw" id="pw" required placeholder="Enter Password" autocomplete="new-password">
                <button type="button" class="password-toggle" onclick="togglePassword()">👁️</button>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="remember_me">
                <label for="remember_me">Remember Me</label>
            </div>
            <button type="submit" class="btn-primary" onclick="saveCredentials()">Authenticate</button>
        </form>
        
        <script>
            // 페이지 로드 시 저장된 정보 불러오기
            window.onload = function() {
                if (localStorage.getItem('tr_remember') === 'true') {
                    document.getElementById('login_id').value = localStorage.getItem('tr_id');
                    document.getElementById('pw').value = localStorage.getItem('tr_pw');
                    document.getElementById('remember_me').checked = true;
                }
            };

            // 로그인 버튼 클릭 시 정보 저장
            function saveCredentials() {
                var remember = document.getElementById('remember_me').checked;
                if (remember) {
                    localStorage.setItem('tr_id', document.getElementById('login_id').value);
                    localStorage.setItem('tr_pw', document.getElementById('pw').value);
                    localStorage.setItem('tr_remember', 'true');
                } else {
                    localStorage.removeItem('tr_id');
                    localStorage.removeItem('tr_pw');
                    localStorage.setItem('tr_remember', 'false');
                }
            }

            function togglePassword() {
                var pwInput = document.getElementById('pw');
                var toggleBtn = document.querySelector('.password-toggle');
                if (pwInput.type === 'password') {
                    pwInput.type = 'text';
                    toggleBtn.textContent = '🔒';
                } else {
                    pwInput.type = 'password';
                    toggleBtn.textContent = '👁️';
                }
            }
        </script>
        
        <div style="margin-top: 2rem; text-align: center; font-size: 0.75rem; color: var(--text-secondary);">
            &copy; 2026 ThrillRig System Intelligence
        </div>
    </div>
</body>
</html>
